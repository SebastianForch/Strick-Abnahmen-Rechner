<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strickmuster-Abnahmen-Rechner</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      input,
      button {
        padding: 8px;
        margin: 5px 0;
      }
      #pattern {
        margin-top: 20px;
        font-family: monospace;
        white-space: pre;
        background-color: #f5f5f5;
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Strickmuster-Abnahmen-Rechner</h1>
      <p>Gib die Start-Maschenanzahl und die Anzahl der Abnahmen ein:</p>
      <label for="stitches">Start-Maschenanzahl:</label>
      <input type="number" id="stitches" min="2" value="20" /><br />
      <label for="decreases">Anzahl der Abnahmen:</label>
      <input type="number" id="decreases" min="1" value="5" /><br />
      <button onclick="calculatePattern()">Muster berechnen</button>
      <div id="pattern"></div>
    </div>

    <script>
      function calculatePattern() {

        const stitches = parseInt(document.getElementById("stitches").value);
        const decreases = parseInt(document.getElementById("decreases").value);
        const patternDiv = document.getElementById("pattern");
        patternDiv.innerHTML = "";

        if (stitches < 2 || decreases < 1 || decreases >= stitches / 2) {
          patternDiv.textContent = 
          `Bitte gültige Werte eingeben:
Start-Maschenanzahl muss größer als 1 und Anzahl der Abnahmen
kleiner als die Hälfte der Start-Maschenanzahl sein.
Sonst sieht das nicht aus Kind!`;
          return;
        }

        const q = Math.floor(stitches / decreases); //bsp 122 16: 7
        const i = stitches - q * decreases; // bsp 122-7*16=10
        const j = decreases - i; // bsp 16-10 = 6

        if (stitches % decreases == 0) {
          patternDiv.innerHTML += `Strick ${decreases} mal die ${q-1}. und die ${q}. Masche zusammen!`;
        } else {
          patternDiv.innerHTML += `Strick ${j} mal die ${q-1}. und die ${q}. 
und ${i} mal die ${q}. und die ${q+1}. 
Masche zusammen!`;
        }
      }
    </script>
  </body>
</html>
